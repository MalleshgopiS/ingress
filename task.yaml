id: ingress-tls-memory-leak
title: "Ingress Controller Recurring HTTPS Gateway Failures with Inconsistent Recovery"
difficulty: expert
category: "kubernetes / ingress / incident-response"

prompt: |
  You are operating on a Kubernetes cluster. The ingress controller is deployed in
  the ingress-system namespace.

  The platform edge gateway has been experiencing recurring HTTPS instability.
  Traffic intermittently fails and temporarily recovers after manual fixes, but
  the issue keeps returning.

  Your goal is to restore a stable and self-sustaining HTTPS ingress system.

  Important notes:
  - Multiple automated processes (including scheduled jobs and controllers) may continuously modify cluster state.
  - Some configuration sources may appear valid but are actually outdated or overridden elsewhere.
  - The correct configuration values are present in the cluster, but not necessarily in the most obvious resource.
  - Some components may indirectly affect the ingress controller through permissions or shared infrastructure.
  - You may need to inspect both configuration resources and access control relationships.
  
  Success criteria:
  - HTTPS traffic works reliably through the ingress controller
  - System remains stable across repeated checks
  - No recurring configuration corruption occurs
  - You may investigate any namespace and resource necessary.

guidance:
  - Investigate both direct and indirect causes
  - Identify which configuration sources are authoritative
  - Ensure long-term stability, not temporary fixes
  - Avoid relying on deprecated or default configuration values
  - Identify which configuration sources are authoritative versus misleading
