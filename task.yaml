id: ingress-controller-oom-restart

prompt: |
  [Context]
  You are an SRE on-call responsible for maintaining the ingress layer of a Kubernetes cluster.

  [Incident]
  The ingress controller in the `ingress-system` namespace has been experiencing periodic restarts over the past few days.

  Observations from the team:
  - Restarts occur every few hours
  - No recent deployments were made
  - HTTPS traffic is intermittently unavailable during restarts
  - The deployment history shows repeated worker memory exhaustion under sustained HTTPS load
  - Memory usage increases gradually over time during active traffic and resets after each pod restart

  Some engineers suspect this may be related to configuration behavior under sustained load or how resources are managed over time, but no clear root cause has been identified yet.

  You may want to explore how different parts of the system behave under sustained load, and whether any patterns in resource usage or runtime behavior could explain the gradual increase in memory consumption.

  The active nginx configuration is managed via the ingress-nginx-config ConfigMap in the ingress-system namespace. Check the ingress-controller deployment annotations for operational context about traffic profile and resource constraints that should inform your investigation.

  There are multiple configuration references in the cluster. Not all of them are guaranteed to be correct or up to date — treat the live ConfigMap as the authoritative source.

  [Objective]
  Investigate the issue and restore stable operation of the ingress controller.

  The system should:
  - Run without unexpected restarts
  - Serve HTTPS traffic reliably
  - Maintain existing configuration structure

  [Constraints]
  - Do not increase memory limits
  - Do not replace the deployment
  - Do not delete and recreate the deployment

metadata:
  category: kubernetes
  difficulty: hard
  estimated_time: 1H
  tags:
    - kubernetes
    - ingress
    - nginx
    - incident-response

allowed_namespaces:
  - ingress-system