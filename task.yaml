name: ingress
description: |
  The ingress controller is experiencing instability due to an incorrect nginx configuration.

  The keepalive_timeout is set to 0, which causes excessive connection churn.

  Your task:
  - Update keepalive_timeout to 65 seconds
  - Restart the ingress-controller deployment

  Constraints:
  - Do NOT delete or recreate the deployment
  - Do NOT change the container image
  - Do NOT modify resource limits
  - Only fix the configuration issue

difficulty: medium

tools:
  - setup_problem
  - grade_problem

entrypoint:
  setup: setup.sh
  solution: solution.sh
  grader: grader.py