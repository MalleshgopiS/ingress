id: ingress-controller-stability-recovery
title: "Ingress Controller HTTPS Instability with Recurring Configuration Drift"
difficulty: hard
category: "kubernetes / ingress / incident-response"
metadata:
  category: kubernetes
  difficulty: hard
  estimated_time: 3H
  tags:
    - kubernetes
    - ingress
    - nginx
    - tls
    - rbac
    - networkpolicy
    - incident-response

prompt: |
  ### Context
  You are a platform engineer responsible for maintaining the Kubernetes ingress layer. The ingress controller runs in the `ingress-system` namespace.

  ### Incident
  Over the past few days, HTTPS traffic through the ingress controller has been unstable. Connections intermittently fail, and temporary fixes (such as restarting the controller) only resolve the issue for a short period before degradation returns. Logs from the ingress controller mention SSL handshake issues and inconsistent connection handling, but no clear root cause has been identified.

  ### Observed Behavior
  * **Traffic:** HTTPS traffic intermittently fails.
  * **Temporary Fix:** Restarting the ingress controller restores service briefly.
  * **Persistence:** Issues reappear after some time without manual changes.
  * **Health:** No resource exhaustion on nodes; upstream services are healthy.

  ### Task
  Investigate the cluster and restore stable HTTPS service. The system must:
  1. Sustain stable HTTPS traffic without requiring restarts.
  2. Maintain correct configuration over time (prevent recurring breakage).
  3. Enforce proper operational constraints expected for this namespace.

  **Potential Areas of Investigation:**
  * Scheduled workloads (CronJobs/Jobs) re-applying bad config.
  * RBAC permissions allowing unauthorized configuration changes.
  * Configuration sources (ConfigMaps / Secrets).
  * Network policies and quotas.
  * Deployment configuration of the ingress controller.

  ### Important Notes
  * Some failures may reoccur due to automated processes in the cluster.
  * Platform baseline values are stored in protected configuration objects.
  * Some required configurations may not exist yet and may need to be recreated based on platform baseline definitions.
  * Not all visible configuration sources are trustworthy.
  - Restoring stability may require removing unauthorized automation,
    correcting configuration values, and re-establishing platform baseline settings
  - Some failures may originate from multiple independent sources and must all be addressed

success_criteria:
  - "HTTPS traffic is stable and SSL handshakes succeed consistently."
  - "No recurring degradation occurs over an extended period."
  - "Configuration remains consistent and resistant to unauthorized drift."
  - "The ingress controller operates without manual intervention."

constraints:
  - "Do not modify container images."
  - "Do not change resource limits."
  - "Do not add or remove services."
  - "Avoid modifying replica counts unless necessary to restore service availability."

allowed_namespaces:
  - default
  - ingress-system
  - kube-system

guidance:
  - "Recurring failures often indicate an automated process reintroducing the issue."
  - "Validate whether configuration values come from authoritative sources."
  - "Inspect RBAC carefully—unauthorized write access can enable hidden interference."
  - "Not all ConfigMaps represent the correct system configuration."
  - "Removing a resource may not be sufficient—correct replacements may be required."
  - "Focus on restoring a stable end-to-end system, not just eliminating symptoms."