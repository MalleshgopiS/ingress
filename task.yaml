name: ingress
description: |
  The Bleater platform edge gateway has become unreliable after a recent
  infrastructure update.

  Users report that HTTPS requests intermittently fail after short idle
  periods. Backend services appear healthy, but the TLS entrypoint is
  unstable and sometimes drops connections.

  Your task is to investigate and restore the ingress gateway so the
  platform becomes stable again.

  You must diagnose the issue using standard Kubernetes and system
  inspection tools, then apply an appropriate configuration fix.

success_criteria: |
  The system is considered restored when:

  • HTTPS traffic to the ingress gateway works reliably
  • The gateway remains stable under repeated traffic
  • The deployment is healthy and fully rolled out
  • No infrastructure topology changes are introduced

constraints: |
  • Do NOT change container images
  • Do NOT modify resource limits
  • Do NOT add or remove services
  • Apply configuration-level fixes only

environment:
  allowed_namespaces:
    - ingress-system

hints: |
  • The issue is likely within gateway configuration rather than backend services
  • Compare runtime behavior with standard nginx ingress defaults
  • Ensure configuration changes are actually applied to running pods
  • Restarting workloads may be required after configuration changes

author: human
difficulty: medium
category: devops
tags:
  - kubernetes
  - ingress
  - nginx
  - debugging
  - sre