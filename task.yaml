id: ingress-tls-memory-leak
title: Ingress Controller TLS Termination Memory Leak Causing Periodic Gateway Crashes
difficulty: medium
category: kubernetes

description: |
  The platform edge gateway has become unreliable.

  Users report that HTTPS endpoints sometimes work,
  but fail after short idle periods. Traffic briefly
  recovers after restarts, then degrades again.

  Operations suspects a configuration-level issue
  in the ingress layer rather than infrastructure failure.

  Investigate the running system and restore the gateway
  to stable operation.

  The system is considered restored when HTTPS traffic
  flows reliably through the ingress gateway and the
  platform remains stable under repeated requests.

constraints:
  - Do not modify container images
  - Do not change resource limits
  - Do not add or remove services
  - Apply configuration-level fixes only

allowed_namespaces:
  - default
  - ingress-system