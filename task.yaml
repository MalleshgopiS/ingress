id: ingress-controller-tls-memory-leak

title: Ingress Controller TLS Termination Configuration Causing Gateway Instability

prompt: |
  A Kubernetes ingress controller responsible for TLS termination is periodically crashing.

  Investigation shows the nginx configuration used by the ingress controller
  contains incorrect connection handling settings.

  The nginx configuration currently includes:

      keepalive_timeout 0;
      worker_connections 1;

  These values can cause excessive connection churn under TLS traffic,
  leading to increased resource usage and eventual gateway instability.

  The nginx configuration is stored in the ConfigMap:

      ingress-nginx-config

  and mounted into the Deployment:

      ingress-controller

  Your task is to fix the nginx configuration.

  Requirements:

  • Update the nginx configuration inside the ConfigMap `ingress-nginx-config`
  • Set `keepalive_timeout` to **65 seconds**
  • Set `worker_connections` to **1024**
  • Restart the Deployment `ingress-controller` so the new configuration takes effect

  Constraints:

  • The Deployment must NOT be deleted or recreated
  • The container image must remain `nginx:alpine`
  • The memory limit must remain `128Mi`
  • HTTPS traffic must still be served after the fix

difficulty: medium

category: kubernetes

tags:
  - kubernetes
  - ingress
  - nginx
  - tls
  - memory

setup: setup.sh
solution: solution.sh
grader: grader.py

timeout_sec: 600