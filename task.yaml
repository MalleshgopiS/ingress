name: Ingress Controller TLS Termination Memory Leak Causing Periodic Gateway Crashes

difficulty: medium

description: |
  The Kubernetes ingress controller responsible for TLS termination is
  periodically crashing under load.

  Investigation shows that the nginx configuration in the ConfigMap
  `ingress-nginx-config` incorrectly sets:

      keepalive_timeout 0;

  When TLS termination is enabled, disabling connection reuse causes
  excessive TLS session creation and memory growth, eventually leading
  to gateway crashes.

  Your task is to fix the nginx configuration.

environment:
  namespace: ingress-system
  deployment: ingress-controller
  configmap: ingress-nginx-config

objectives:
  - Update keepalive_timeout from 0 to 65
  - Ensure the ingress controller reloads the updated configuration

constraints:
  - Do NOT delete or recreate the deployment
  - Deployment UID must remain unchanged
  - Container image must remain nginx:1.25-alpine
  - Memory limit must remain 128Mi

success_criteria:
  - Deployment becomes ready
  - TLS endpoint responds successfully
  - HTTPS response contains:

        Ingress Controller Running

notes: |
  The ingress controller uses nginx for TLS termination.
  After modifying a ConfigMap mounted into a running pod,
  the deployment may need to be restarted so nginx reloads
  the configuration.