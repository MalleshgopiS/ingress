id: ingress-controller
prompt: |
  [Context]
  You are an SRE on-call responsible for maintaining the ingress layer of a Kubernetes cluster.

  [Incident]
  The ingress controller in the `ingress-system` namespace has been experiencing periodic restarts over the past few days.

  Observations from the team:
  - Restarts occur every few hours
  - No recent deployments were made
  - HTTPS traffic is intermittently unavailable during restarts
  - Memory usage grows proportionally to HTTPS connection volume, suggesting per-connection resource usage or session accumulation

  Some engineers suspect this might be related to configuration drift or resource usage patterns, but no clear root cause has been identified yet.

  There are multiple configuration references in the cluster. Not all of them are guaranteed to be correct or up to date.
  Platform security policies and acceptable parameter limits for ingress workloads are documented in cluster resources within the `ingress-system` namespace.

  [Objective]
  Investigate the issue and restore stable operation of the ingress controller.

  The system should:
  - Run without unexpected restarts
  - Serve HTTPS traffic reliably
  - Maintain existing configuration structure

  [Constraints]
  - The ingress controller must continue serving HTTPS traffic after your changes
  - Do not modify the container image or resource definitions

  
metadata:
  category: kubernetes
  difficulty: hard
  estimated_time: 1H
  tags:
    - kubernetes
    - ingress
    - nginx
    - incident-response
    - configuration

allowed_namespaces:
  - ingress-system
