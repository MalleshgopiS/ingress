id: ingress-tls-memory-leak
title: "Ingress Controller TLS Termination Memory Leak Causing Periodic Gateway Crashes"
difficulty: expert
category: "kubernetes / ingress / incident-response"

metadata:
  category: kubernetes
  difficulty: expert
  estimated_time: 4H
  tags:
    - kubernetes
    - ingress
    - nginx
    - tls
    - rbac
    - networkpolicy
    - incident-response

prompt: |
  [Context]
  You are operating on a Kubernetes cluster. The ingress controller is deployed in
  the ingress-system namespace.

  [Incident]
  Three days ago the platform edge gateway started dropping HTTPS connections sporadically.
  On-call acknowledged the alert, restarted the pod, and traffic recovered. Six hours later
  the failures returned. The cycle has repeated every few hours: brief recovery, degradation,
  then another forced restart. The SRE team confirmed upstream services are healthy and node
  resources show no saturation. A junior engineer noticed nginx worker process logs mention
  SSL handshake errors but could not trace the root cause before their shift ended.

  [Task]
  Investigate the cluster and restore stable, self-sustaining HTTPS service through the
  ingress controller. The gateway must not require manual restarts to recover. Identify
  and eliminate whatever is causing the recurring failures — the cluster may have been
  tampered with in multiple ways.

  Note:
  Some operational baseline configuration values used by the ingress platform
  are stored in cluster configuration objects managed by the platform team.
  Investigating ConfigMaps and Secrets in the ingress-system namespace may
  reveal important recovery parameters.

  After removing malicious resources, proper governance resources such as
  NetworkPolicies and ResourceQuotas may need to be restored for stable operation.

  [Verification]
  The incident is resolved when HTTPS traffic flows reliably through the ingress controller
  without manual intervention and the controller sustains stable operation without restarting.

constraints:
  - "Do not modify container images"
  - "Do not change resource limits"
  - "Do not add or remove services"

allowed_namespaces:
  - default
  - ingress-system

guidance:
  - "Secrets maintained by the platform team contain authoritative baseline configuration values."
  - "Some ConfigMaps may contain default, outdated, or deprecated values and should not be blindly trusted."
  - "Malicious or poisoned resources should be removed entirely rather than modified."
  - "Unauthorized ServiceAccounts introduced during the incident should be fully removed, not just unused."
  - "Some RBAC resources and disruption controls may appear legitimate but could have been introduced during the incident — verify their necessity carefully."
  - "PodDisruptionBudgets can block recovery if misconfigured — ensure they align with the expected replica count."
  - "Restoring stable operation may require correcting both access controls and configuration sources across namespaces."