id: ingress-controller-tls-memory-leak

title: Ingress Controller TLS Termination Memory Leak Causing Periodic Gateway Crashes

prompt: |
  The Kubernetes ingress controller responsible for TLS termination is periodically crashing.

  Investigation shows the nginx configuration inside the ingress controller
  contains the following directive:

      keepalive_timeout 0;

  Under TLS traffic this causes connections to remain open indefinitely,
  leading to excessive memory consumption and periodic gateway crashes.

  Your task is to fix the nginx configuration so idle TLS connections
  are closed properly.

  Requirements:
  • Update the configuration so keepalive_timeout is set to 65 seconds
  • Restart the ingress controller deployment so the change takes effect
  • The ingress service must remain functional after the fix
  • Do not modify the container image
  • Do not modify resource limits
  • Only fix the configuration issue

difficulty: medium
category: kubernetes

tags:
  - kubernetes
  - ingress
  - nginx
  - tls
  - memory

setup: setup.sh
solution: solution.sh
grader: grader.py

timeout_sec: 600