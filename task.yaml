id: ingress-tls-memory-leak
title: "Ingress Controller TLS Termination Memory Leak Causing Periodic Gateway Crashes"
difficulty: expert
category: "kubernetes / ingress / incident-response"

metadata:
  category: kubernetes
  difficulty: expert
  estimated_time: 4H
  tags:
    - kubernetes
    - ingress
    - nginx
    - tls
    - rbac
    - networkpolicy
    - incident-response

prompt: |
  [Context]
  You are operating on a Kubernetes cluster. The ingress controller is deployed in
  the ingress-system namespace.

  [Incident]
  Three days ago the platform edge gateway started dropping HTTPS connections sporadically.
  On-call acknowledged the alert, restarted the pod, and traffic recovered. Six hours later
  the failures returned. The cycle has repeated every few hours: brief recovery, degradation,
  then another forced restart. The SRE team confirmed upstream services are healthy and node
  resources show no saturation. A junior engineer noticed nginx worker process logs mention
  SSL handshake errors but could not trace the root cause before their shift ended.

  [Task]
  Investigate the cluster and restore stable, self-sustaining HTTPS service through the
  ingress controller. The gateway must not require manual restarts to recover. Identify
  and eliminate whatever is causing the recurring failures — the cluster may have been
  tampered with in multiple ways.

  During investigation, you may need to examine workloads, scheduled jobs, RBAC permissions,
  configuration sources, and networking controls across allowed namespaces.

  Note:
  Some operational baseline configuration values used by the ingress platform are stored
  in cluster configuration objects managed by the platform team. Investigating ConfigMaps
  and Secrets in the ingress-system namespace may reveal important recovery parameters.
  Some resources may appear valid but could have been introduced or modified during the
  incident. Validate their necessity carefully before retaining them.

  After removing malicious or conflicting resources, proper governance resources such as
  NetworkPolicies and ResourceQuotas may need to be restored for stable operation.

  [Verification]
  The incident is resolved when HTTPS traffic flows reliably through the ingress controller
  without manual intervention and the controller sustains stable operation without restarting.

constraints:
  - "Do not modify container images"
  - "Do not change resource limits"
  - "Do not add or remove services"
  - "Do not change the number of replicas"

allowed_namespaces:
  - default
  - ingress-system

guidance:
  # Base Platform Guidance
  - "Secrets maintained by the platform team contain authoritative baseline configuration values."
  - "Some ConfigMaps may contain default, outdated, or deprecated values and should not be blindly trusted."
  - "Malicious or poisoned resources should be removed entirely rather than modified."
  
  # ServiceAccount + Deployment (FINAL FIX)
  - "Unauthorized ServiceAccounts introduced during the incident must be deleted using kubectl delete, not just removed from workload references."
  - "Verify that workloads are not configured to use unauthorized ServiceAccounts introduced during the incident."
  - "The ingress controller deployment may have been modified to use a non-default ServiceAccount that was not part of the original platform configuration."
  - "The ingress controller typically runs using the default ServiceAccount unless explicitly configured otherwise."
  - "Inspect the deployment specification for unexpected containers, probes, or ServiceAccount changes introduced during the incident."
  - "After removing unauthorized ServiceAccounts, ensure the ingress controller deployment is not still configured to reference them."
  
  # RBAC / Control Plane
  - "RBAC resources associated with unauthorized ServiceAccounts (such as nginx-watcher-config) may also need to be removed if they are not part of baseline platform configuration."
  - "Some RBAC resources and disruption controls may appear legitimate but could have been introduced during the incident — verify their necessity carefully."
  
  # Recovery Blockers
  - "PodDisruptionBudgets blocking recovery should be deleted rather than modified."
  
  # Final System Restoration
  - "Restoring stable operation may require correcting both access controls and configuration sources across namespaces."