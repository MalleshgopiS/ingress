id: ingress-tls-memory-leak
title: "Ingress Controller Recurring HTTPS Gateway Failures with Inconsistent Recovery"
difficulty: expert
category: "kubernetes / ingress / incident-response"

metadata:
  category: kubernetes
  difficulty: expert
  estimated_time: 4H
  tags:
    - kubernetes
    - ingress
    - nginx
    - tls
    - rbac
    - networkpolicy
    - incident-response

prompt: |
  [Context]
  You are operating on a Kubernetes cluster. The ingress controller is deployed in
  the ingress-system namespace.

  [Incident]
  Over the past several days, the platform edge gateway has exhibited recurring HTTPS
  instability. Traffic intermittently fails, then temporarily recovers after manual
  intervention, only to degrade again after some time.

  Prior responders confirmed that upstream services remain healthy and node-level
  resources are not exhausted. However, repeated recovery attempts have not resulted
  in a lasting fix.

  [Task]
  Investigate the cluster and restore stable, self-sustaining HTTPS service through
  the ingress controller. The system must remain stable over time without requiring
  repeated manual intervention.

  The current cluster state may not accurately reflect its intended configuration.
  Multiple independent factors may be contributing to the observed behaviour, and
  some may not be immediately visible from the ingress controller itself.

  [Environment]
  You may investigate resources across the allowed namespaces. Be aware that:
  - Not all issues necessarily originate from the ingress-system namespace
  - Some components may behave correctly in isolation but interact incorrectly over time
  - Certain cluster resources may have been introduced or modified during the incident

  [Verification]
  The incident is considered resolved when HTTPS traffic flows reliably through the
  ingress controller and remains stable over time without requiring manual restarts.

guidance:
  - "The observed behaviour may have more than one contributing cause."
  - "Cluster state should not be assumed to be correct or complete."
  - "Investigate both direct and indirect interactions between components."
  - "Focus on restoring stable long-term behaviour, not just temporary recovery."