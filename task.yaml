id: ingress-controller-oom-restart
prompt: |
  [Context]
  You are the on-call SRE responsible for maintaining the ingress layer of a Kubernetes cluster.

  The cluster is running multiple workloads, and the ingress controller is deployed in the `ingress-system` namespace.
  You can verify accessible namespaces at `/home/ubuntu/.allowed_namespaces`.

  Relevant system configuration and operational details may be present within cluster resources.
  Be aware that multiple configuration references may exist, but not all of them are guaranteed to be correct or up to date.

  [TASK]
  A critical issue has been reported: HTTPS traffic routed through the ingress layer is failing intermittently,
  and users are experiencing service disruptions.

  The ingress controller appears to restart periodically, and although the pod often shows a Running state,
  it does not consistently respond to requests on port 443.

  **Instructions**:
  * Investigate the ingress controller deployment and associated resources in the `ingress-system` namespace.
  * Identify why the controller is restarting and why HTTPS traffic is not being served reliably.
  * Review the active NGINX configuration (ConfigMap: `ingress-nginx-config`) and determine whether any configuration
    may be contributing to memory growth, instability, or traffic handling issues.
  * Examine monitoring and alerting setup to ensure that failures of this nature are properly detected.
  * Look for any automated processes or controllers that may be reverting configuration changes.

  > **Note:** The system has shown signs of recurring instability even after previous fixes.
  > Ensure that any remediation you apply remains persistent and is not overridden by automation.

  [Goal]
  Restore stable operation of the ingress controller.

  The system should:
  - Run without unexpected restarts
  - Serve HTTPS traffic reliably
  - Have properly functioning monitoring alerts for ingress-related failures

  After completing the investigation and applying fixes, document your findings by writing a postmortem
  report at /workdir/postmortem.md.

  [Constraints]
  - Do not increase memory limits
  - Do not replace the deployment
  - Do not delete and recreate the deployment

metadata:
  category: kubernetes
  difficulty: hard
  estimated_time: 1H
  tags:
    - kubernetes
    - ingress
    - nginx
    - incident-response

allowed_namespaces:
  - ingress-system
  - default