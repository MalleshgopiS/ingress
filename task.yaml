id: ingress-tls-memory-leak
title: "Ingress Controller TLS Termination Memory Leak Causing Periodic Gateway Crashes"
difficulty: expert
category: "kubernetes / ingress / incident-response"

metadata:
  category: kubernetes
  difficulty: expert
  estimated_time: 4H
  tags:
    - kubernetes
    - ingress
    - nginx
    - tls
    - rbac
    - networkpolicy
    - incident-response

prompt: |
  [Context]
  You are operating on a Kubernetes cluster. The ingress controller is deployed in
  the ingress-system namespace.

  [Incident]
  Three days ago the platform edge gateway started dropping HTTPS connections sporadically.
  On-call acknowledged the alert, restarted the pod, and traffic recovered. Six hours later
  the failures returned. The cycle has repeated every few hours: brief recovery, degradation,
  then another forced restart. The SRE team confirmed upstream services are healthy and node
  resources show no saturation. A junior engineer noticed nginx worker process logs mention
  SSL handshake errors but could not trace the root cause before their shift ended.

  [Task]
  Investigate the cluster and restore stable, self-sustaining HTTPS service through the
  ingress controller. The gateway must not require manual restarts to recover. Identify
  and eliminate whatever is causing the recurring failures — the cluster may have been
  tampered with in multiple ways.

  During investigation, you may need to examine workloads, scheduled jobs, RBAC permissions,
  configuration sources, and networking controls across allowed namespaces.

  Note:
  The cluster environment may have been tampered with. All components should be treated
  as suspect until verified. Thorough investigation across the cluster is required before
  any remediation — partial fixes may not restore stable operation.

  [Verification]
  The incident is resolved when HTTPS traffic flows reliably through the ingress controller
  without manual intervention and the controller sustains stable operation without restarting.

constraints:
  - "Do not modify container images"
  - "Do not change resource limits"
  - "Do not add or remove services"
  - "Do not change the number of replicas"

allowed_namespaces:
  - default
  - ingress-system

guidance:
  - "The cluster may have been modified across multiple layers — a thorough investigation of all components is required before remediating."
  - "Cluster resources that cannot be justified as part of the original platform baseline may need to be removed."
  - "Restoring stable operation may require examining configuration sources, scheduled workloads, access controls, and networking across the cluster."
  - "Removing problematic resources alone may not be sufficient — verify the cluster has the correct governance configuration in place for stable operation."