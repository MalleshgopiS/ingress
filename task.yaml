id: ingress-tls-memory-leak
title: "Ingress Controller Recurring HTTPS Gateway Failures with Inconsistent Recovery"
difficulty: expert
category: "kubernetes / ingress / incident-response"
metadata:
  category: kubernetes
  difficulty: expert
  estimated_time: 4H
  tags:
    - kubernetes
    - ingress
    - nginx
    - tls
    - rbac
    - networkpolicy
    - incident-response

prompt: |
  [Context]
  You are operating on a Kubernetes cluster. The ingress controller is deployed in
  the ingress-system namespace.

  [Incident]
  Three days ago the platform edge gateway started dropping HTTPS connections sporadically.
  On-call acknowledged the alert, restarted the pod, and traffic recovered. Six hours later
  the failures returned. The cycle has repeated every few hours: brief recovery, degradation,
  then another forced restart. The SRE team confirmed upstream services are healthy and node
  resources show no saturation. A junior engineer noticed nginx worker process logs mention
  SSL handshake errors but could not trace the root cause before their shift ended.

  [Task]
  Investigate the cluster and restore stable, self-sustaining HTTPS service through the
  ingress controller. The gateway must not require manual restarts to recover. Identify
  and eliminate whatever is causing the recurring failures — the cluster may have been
  tampered with in multiple ways across several resource types.

  Note:
  Authoritative platform configuration for this ingress deployment is stored in Secrets
  managed by the platform team — not in ConfigMaps, which may be stale or tampered.
  Removing a resource that blocks operation is not always sufficient; the platform may
  require a correctly configured replacement to resume stable service.

  [Verification]
  The incident is resolved when HTTPS traffic flows reliably through the ingress controller
  without manual intervention and the controller sustains stable operation without restarting.

constraints:
  - "Do not modify container images"
  - "Do not change resource limits"
  - "Do not add or remove services"
  - "Do not change the number of replicas"

allowed_namespaces:
  - default
  - ingress-system

guidance:
  - "A fix that holds temporarily but reverts is not a complete fix — find and eliminate the source of recurrence before declaring recovery."
  - "The ingress-system namespace Secrets contain the authoritative nginx tuning values; ConfigMaps in that namespace may reflect deprecated or attacker-modified defaults."
  - "Stable operation may require correct governance controls to be present — not just absent malicious ones."
