id: ingress-tls-memory-leak
title: Ingress Controller TLS Termination Memory Leak Causing Periodic Gateway Crashes
difficulty: expert
category: kubernetes

description: |
  Three days ago the platform edge gateway started dropping HTTPS connections
  sporadically. On-call acknowledged the alert, restarted the pod, and traffic
  came back. Six hours later the failures returned. The pattern has repeated
  every few hours since: brief recovery, then degradation, then another restart.

  The SRE team has confirmed that upstream services are healthy and node
  resources are not saturated. All fingers point to the ingress layer itself.
  A junior engineer noticed the nginx worker process logs mention SSL handshake
  errors but could not trace the root cause before their shift ended.

  The controller is deployed in the ingress-system namespace.

  Your task is to get the gateway back to stable operation and ensure it stays
  that way. HTTPS traffic must flow reliably and the controller must not require
  manual restarts to recover. While investigating, audit the cluster for any
  configurations, access controls, or scheduled workloads that do not belong —
  the instability pattern is unusual enough that tampering cannot be ruled out.

