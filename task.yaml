id: ingress-tls-memory-leak
title: Ingress Controller TLS Termination Memory Leak Causing Periodic Gateway Crashes
difficulty: expert
category: kubernetes

description: |
  Three days ago the platform edge gateway started dropping HTTPS connections
  sporadically. On-call acknowledged the alert, restarted the pod, and traffic
  came back. Six hours later the failures returned. The pattern has repeated
  every few hours since: brief recovery, then degradation, then another restart.

  The SRE team has confirmed that upstream services are healthy and node
  resources are not saturated. All fingers point to the ingress layer itself.
  A junior engineer noticed the nginx worker process logs mention SSL handshake
  errors but could not trace the root cause before their shift ended.

  The controller is deployed in the ingress-system namespace.

  Your task is to restore the gateway to stable operation. HTTPS traffic must
  flow reliably and the controller must not require manual restarts to recover.
  Restore all gateway parameters to their pre-incident baseline values — the
  operations team maintains a platform baseline configuration in the cluster
  for disaster recovery purposes. Consult the deployment's operational
  annotations and associated cluster secrets for the full set of recovery
  specifications.

  Operational controls (ResourceQuota, NetworkPolicy) that were tampered with
  must be fully removed and recreated with correct pre-incident specifications —
  patching the tampered resource in place is not sufficient.

  While investigating, audit all allowed namespaces thoroughly — tampering
  may span multiple namespaces. Remove any configurations, access controls,
  or scheduled workloads that do not belong.

