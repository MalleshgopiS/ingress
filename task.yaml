id: ingress-tls-memory-leak
title: "Ingress Controller Recurring HTTPS Gateway Failures with Inconsistent Recovery"
difficulty: expert
category: "kubernetes / ingress / incident-response"

prompt: |
  You are operating on a Kubernetes cluster. The ingress controller is deployed in
  the ingress-system namespace.

  The platform HTTPS gateway has been experiencing persistent failures. Multiple
  remediation attempts have been made but the system keeps returning to a degraded
  state shortly after each fix. The root cause has not yet been identified.

  Your task is to diagnose the full cause of the instability and restore the HTTPS
  gateway to a stable, self-sustaining operational state.

  You may investigate any resource in the cluster. The problem has multiple
  interacting causes spanning several areas:

  - Unauthorized workloads may be actively interfering with cluster resources
    across multiple namespaces
  - RBAC permissions may have been tampered with, granting unauthorized workloads
    elevated access to cluster resources
  - The runtime environment of the ingress controller process may have been altered
  - Scheduling or networking constraints may be blocking pod recovery — resources
    that are removed may need to be replaced with correct equivalents rather than
    left absent; check cluster configuration resources for the expected values
  - nginx configuration values must match the authoritative baseline — Secrets in
    the ingress namespace may hold the definitive tuning parameters, while some
    ConfigMaps may be deprecated or tampered
  - TLS certificates may be invalid or getting corrupted
  - Secondary ConfigMaps may be sourcing stale or corrupted configuration

  Success criteria:
  - HTTPS traffic is served reliably
  - The system remains healthy without further intervention

guidance:
  - A fix that holds temporarily but then reverts is not a complete fix —
    understand why it reverts before applying it
  - Ensure nothing remains that could re-compromise the system after you finish
  - Some cluster resources must exist in a correct state to allow normal operation;
    removing a broken resource without creating a valid replacement may leave the
    system in a different broken state
