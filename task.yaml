id: ingress-tls-memory-leak
title: "Ingress Controller Recurring HTTPS Gateway Failures with Inconsistent Recovery"
difficulty: expert
category: "kubernetes / ingress / incident-response"
metadata:
  category: kubernetes
  difficulty: expert
  estimated_time: 4H
  tags:
    - kubernetes
    - ingress
    - nginx
    - tls
    - rbac
    - networkpolicy
    - incident-response

prompt: |
  [Context]
  You are operating on a Kubernetes cluster. The ingress controller is deployed in
  the ingress-system namespace.

  [Incident]
  Three days ago the platform edge gateway started dropping HTTPS connections sporadically.
  On-call acknowledged the alert, restarted the pod, and traffic recovered. Six hours later
  the failures returned. The cycle has repeated every few hours: brief recovery, degradation,
  then another forced restart. The SRE team confirmed upstream services are healthy and node
  resources show no saturation. A junior engineer noticed nginx worker process logs mention
  SSL handshake errors but could not trace the root cause before their shift ended.

  [Task]
  Investigate the cluster and restore stable, self-sustaining HTTPS service through the
  ingress controller. The gateway must not require manual restarts to recover. Identify
  and eliminate whatever is causing the recurring failures — the cluster may have been
  tampered with in multiple ways across several resource types.

  Note:
  Authoritative platform configuration for this ingress deployment is stored in Secrets
  managed by the platform team — not in ConfigMaps, which may be stale or tampered.
  Removing a blocking resource is not always sufficient — the platform requires a
  correctly configured replacement to resume stable operation; the expected values and
  resource limits are documented in the namespace and discoverable through investigation.
  The deployment spec itself may have been altered — tampering can extend beyond
  configuration files to the running workload definition, including its containers,
  health probes, and service account.
  Some attack workloads operate from namespaces outside your direct access scope. You
  cannot delete them directly, but revoking their cross-namespace access from within
  ingress-system is a valid and sufficient containment strategy.

  [Verification]
  The incident is resolved when HTTPS traffic flows reliably through the ingress controller
  without manual intervention and the controller sustains stable operation without restarting.

constraints:
  - "Do not modify container images"
  - "Do not add or modify resource limits on existing containers"
  - "Do not add or remove services"
  - "Do not change the number of replicas"

allowed_namespaces:
  - default
  - ingress-system

guidance:
  - "Fixes that hold briefly then revert indicate an active scheduled process is undoing your changes — audit all scheduled workloads across every namespace you can access, not just ingress-system, before declaring the environment stable."
  - "The ingress-system namespace contains a platform-managed Secret with the four authoritative nginx tuning values — both the nginx ConfigMap and the live process configuration must reflect those exact values simultaneously for the fix to hold."
  - "The namespace had resource governance in place before the incident — the correct pod limit is documented in a ConfigMap discoverable within ingress-system; removing a bad quota without restoring a valid replacement with that value leaves the namespace non-compliant."
  - "Removing a network policy that blocks traffic is not sufficient to restore connectivity — the ingress controller also requires an explicit inbound allow rule for its service port to be created as a separate step."
  - "The TLS certificate loaded by the ingress controller may have been tampered with — verify the Secret in ingress-system contains a valid certificate and that the nginx process loads it without errors."
  - "The deployment spec may contain more than the expected nginx container — check for unrecognised additional containers, verify the liveness probe is targeting the correct port, and confirm the service account assignment is appropriate."
  - "Some attack workloads run from namespaces outside your direct access — revoking or removing the Role or RoleBinding that grants them write access to ingress-system is sufficient to stop them; any ConfigMap they were using as a configuration template should also be removed from ingress-system."
