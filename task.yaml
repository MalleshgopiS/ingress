id: ingress-controller-oom-restart
prompt: |
  [Context]
  You are the on-call SRE responsible for maintaining the ingress layer of a Kubernetes cluster.

  [TASK]
  A critical incident has been observed in the ingress layer. The ingress controller running in the `ingress-system` namespace has been restarting periodically over the past few days. These restarts occur every few hours despite no recent deployments or intentional configuration changes.

  During this time, HTTPS requests routed through the ingress are not completing successfully. Even though the pod reports a Running state, it is not responding on port 443.

  Historical observations show that under sustained HTTPS traffic, the controller experiences memory exhaustion. Memory usage gradually increases during active traffic and then resets after each restart, indicating a pattern of accumulation rather than sudden spikes.

  Previous remediation attempts have only provided temporary relief. The issue repeatedly returns, suggesting that an automated process or controller may be reverting changes and restoring an unstable configuration.

  Monitoring has also failed to detect the problem. No alerts were triggered for the ingress-system namespace despite repeated restarts. This means the alerting rules must be investigated, reviewed, and corrected. Ensure that Prometheus metric names used in alert expressions are accurate and match the actual emitted metrics.

  There is a working theory that the issue may be related to how the NGINX TLS configuration behaves under sustained load, especially given the current memory constraints. However, no definitive root cause has been identified yet.

  The active NGINX configuration is managed through the `ingress-nginx-config` ConfigMap in the `ingress-system` namespace. Multiple configuration references exist across the cluster, but they may not all be valid or up to date. The live ConfigMap should be treated as the authoritative source.

  Your task is to investigate the cluster resources and identify all contributing factors to the instability. Pay close attention to TLS-related settings, including session caching, session tickets, cipher suite configuration, and the network interface configuration, as these may lead to memory growth or prevent external traffic from reaching the service.

  [Objective]
  Restore stable operation of the ingress controller. The system should run without unexpected restarts, reliably serve HTTPS traffic, and have properly functioning monitoring alerts targeting the ingress controller. The overall NGINX configuration structure should be preserved while making necessary TLS-related adjustments.

  Once the issue has been resolved, document your findings and actions by writing a postmortem report at /workdir/postmortem.md.

  [Constraints]
  Do not increase memory limits.
  Do not replace the deployment.
  Do not delete and recreate the deployment.

metadata:
  category: kubernetes
  difficulty: hard
  estimated_time: 1H
  tags:
    - kubernetes
    - ingress
    - nginx
    - incident-response

allowed_namespaces:
  - ingress-system
  - default