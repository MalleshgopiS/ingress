id: ingress-tls-memory-leak
title: Ingress Controller TLS Termination Memory Leak Causing Periodic Gateway Crashes
difficulty: expert
category: kubernetes

description: |
  Three days ago the platform edge gateway started dropping HTTPS connections
  sporadically. On-call acknowledged the alert, restarted the pod, and traffic
  came back. Six hours later the failures returned. The pattern has repeated
  every few hours since: brief recovery, then degradation, then another restart.

  The SRE team has confirmed that upstream services are healthy and node
  resources are not saturated. All fingers point to the ingress layer itself.
  A junior engineer noticed the nginx worker process logs mention SSL handshake
  errors but could not trace the root cause before their shift ended.

  The controller is deployed in the ingress-system namespace.

  Your task is to restore the gateway to stable operation. HTTPS traffic must
  flow reliably and the controller must not require manual restarts to recover.
  Restore all gateway parameters to their pre-incident baseline values — the
  operations team maintains a platform baseline configuration (platform-ops-baseline
  ConfigMap) in the ingress-system namespace for disaster recovery purposes.
  Consult the deployment's operational annotations and associated cluster secrets
  for the full set of recovery specifications, including exact ResourceQuota names
  and NetworkPolicy names required for replacement resources.

  Operational controls (ResourceQuota, NetworkPolicy) that were tampered with
  must be fully removed and recreated with the correct names and specifications
  found in the platform baseline — patching the tampered resource in place is
  not sufficient. The replacement resource names are recorded in the platform
  baseline ConfigMap and in the deployment's operational annotations.

  While investigating, audit both allowed namespaces thoroughly — tampering
  may span multiple namespaces, including workloads in other namespaces that
  hold RBAC grants into ingress-system. Remove any configurations, access
  controls (including PodDisruptionBudgets), or scheduled workloads that do
  not belong. Attackers operating from outside the allowed namespaces can be
  neutralized by revoking their RBAC grants from within ingress-system.

