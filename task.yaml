timeout_sec: 900

prompt: |
  The ingress gateway for Bleater is unstable in production.

  HTTPS requests intermittently fail after short idle periods.
  Backend services are healthy, but the TLS entrypoint is unreliable.

  Investigate and restore the ingress layer so the platform works normally again.

  The system is considered restored when:
  - HTTPS traffic to the ingress-controller works reliably
  - The gateway remains stable under repeated traffic
  - No infrastructure topology changes are introduced

constraints:
  - Do not change container images
  - Do not change resource limits
  - Use Kubernetes configuration changes only