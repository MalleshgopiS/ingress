id: ingress-controller-tls-memory-leak

title: Ingress Controller TLS Termination Memory Leak Causing Periodic Gateway Crashes

prompt: |
  The Kubernetes ingress controller responsible for TLS termination is periodically crashing.

  Investigation shows the nginx configuration inside the ingress controller
  may contain settings that allow idle TLS connections to remain open too long,
  eventually leading to excessive memory usage.

  The nginx configuration is stored in the ConfigMap:

      ingress-nginx-config

  and mounted into the Deployment:

      ingress-controller

  Your task is to investigate the nginx configuration and fix the issue
  so idle TLS connections are handled properly.

  Requirements:

  • Update the nginx configuration in ConfigMap `ingress-nginx-config`
  • Restart the Deployment `ingress-controller` so the change takes effect
  • The Deployment must NOT be deleted or recreated
  • The container image must remain `nginx:alpine`
  • The container memory limit must remain `128Mi`
  • HTTPS traffic must still be served after the fix

difficulty: medium

category: kubernetes

tags:
  - kubernetes
  - ingress
  - nginx
  - tls
  - memory

setup: setup.sh
solution: solution.sh
grader: grader.py

timeout_sec: 600