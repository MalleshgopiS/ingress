id: ingress-controller-oom-restart
prompt: |
  [Context]
  You are a DevOps engineer working on Bleater, a distributed microservices-based social media platform.
  Bleater is deployed on Kubernetes (k3s) in the bleater namespace. You can check all available namespaces at /home/ubuntu/.allowed_namespaces.

  Information about the application and supporting infrastructure is available at http://gitea.devops.local/root/bleater-app/wiki. Passwords are stored here: http://passwords.devops.local/.

  Your email is set up at devops@nebula.local and can be accessed via http://maddy.devops.local/.
  For team communication, Mattermost is used and is available at http://mattermost.devops.local/.

  [Task]
  The ingress controller in the ingress-system namespace has been restarting
  every few hours with no recent deployments or intentional config changes.
  HTTPS traffic through the ingress is failing — the pod appears Running but
  is not responding on port 443.

  The pattern suggests memory exhaustion under HTTPS load. Previous fixes have
  not held — something in the cluster appears to be reverting them.

  Monitoring has also been silent throughout: no alerts have fired despite
  repeated restarts. The alerting rules may need review, including whether the
  metric names in alert expressions match what's actually being emitted.

  The active config is in the ingress-nginx-config ConfigMap in
  ingress-system. There are other configuration references across the cluster
  that may not be accurate — treat the live ConfigMap as authoritative.

  [Objective]
  Investigate and restore stable operation of the ingress controller: no
  unexpected restarts, HTTPS traffic served reliably, and alerts correctly
  configured. Preserve the overall NGINX config structure.

  Write a postmortem at /workdir/postmortem.md once resolved.

  [Constraints]
  Do not increase memory limits.
  Do not replace or recreate the deployment.
  Do NOT use interactive commands (e.g. -i, -it flags).
metadata:
  category: kubernetes
  difficulty: hard
  estimated_time: 4H 
