name: ingress-memory-leak
description: |
  The Kubernetes ingress controller is experiencing periodic gateway crashes.

  Investigation shows:
  - TLS termination is enabled
  - The ingress controller pods are being OOMKilled
  - Memory usage keeps increasing due to a configuration issue

  Your task:
  - Fix the memory leak by applying appropriate configuration changes
  - Ensure the ingress controller becomes stable
  - Restart the deployment safely

  Constraints:
  - Do NOT delete or recreate the deployment
  - Do NOT change the container image
  - Do NOT disable TLS
  - Only apply configuration and resource fixes

difficulty: medium

entrypoint:
  setup: setup.sh
  solution: solution.sh
  grader: grader.py