id: ingress

title: Ingress Controller TLS Termination Memory Leak Causing Periodic Gateway Crashes

prompt: |
  A Kubernetes ingress controller responsible for TLS termination is periodically crashing.

  Investigation shows the nginx configuration used by the ingress controller
  contains the directive:

      keepalive_timeout 0;

  With TLS traffic this keeps idle connections open indefinitely, causing
  memory usage to grow until the gateway eventually crashes.

  The nginx configuration is stored in the ConfigMap:

      ingress-nginx-config

  and is mounted into the Deployment:

      ingress-controller

  Your task is to fix the nginx configuration so idle TLS connections
  are closed properly.

  Requirements:

  Update the nginx configuration inside the ConfigMap `ingress-nginx-config`
  so the directive becomes:

      keepalive_timeout 65;

  Restart the Deployment `ingress-controller`
  so the new configuration takes effect.

  The Deployment must NOT be deleted or recreated.

  The container image must remain:

      nginx:alpine

  The memory limit must remain:

      128Mi

  After the fix the ingress controller must still serve HTTPS traffic.

difficulty: medium

category: kubernetes

tags:
  - kubernetes
  - ingress
  - nginx
  - tls
  - memory

setup: setup.sh
solution: solution.sh
grader: grader.py

timeout_sec: 600