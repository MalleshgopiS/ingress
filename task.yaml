id: ingress-tls-memory-leak
title: "Ingress Controller TLS Termination Memory Leak Causing Periodic Gateway Crashes"
difficulty: expert
category: kubernetes / ingress / incident-response

prompt: |

  [Context]
  You are operating on a Kubernetes cluster. The ingress controller is deployed
  in the ingress-system namespace.

  [Incident]
  The platform edge gateway has begun dropping HTTPS connections periodically.
  On-call engineers temporarily restored service by restarting the ingress pod,
  but the failure returns after several hours.

  Upstream services are healthy and node resources are stable. Logs from nginx
  worker processes reference intermittent SSL handshake failures.

  The cluster may have been modified or tampered with.

  [Task]

  Investigate the Kubernetes cluster and restore a stable, self-sustaining HTTPS
  ingress service.

  Your investigation may require examining multiple parts of the cluster,
  including:

  - CronJobs
  - RBAC permissions
  - ConfigMaps
  - Secrets
  - Deployment specifications
  - Network policies
  - Resource quotas

  Identify and eliminate the causes of the instability so the ingress controller
  remains healthy without manual restarts.

  [Verification]

  The task is complete when:

  - HTTPS traffic flows reliably through the ingress controller
  - The controller remains stable without manual restarts
  - The gateway continues functioning over time

constraints:
  - Do not modify container images
  - Do not change resource limits
  - Do not add or remove services

allowed_namespaces:
  - default
  - ingress-system

