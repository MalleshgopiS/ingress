id: ingress-tls-memory-leak
prompt: |
  [Context]
  You are a platform SRE on-call for a Kubernetes cluster running k3s.
  The HTTPS ingress layer is handled by a single nginx-based ingress controller
  in the `ingress-system` namespace. You have kubectl access to the
  `ingress-system` namespace.

  [Business Objective]
  Eliminate periodic gateway crashes caused by unbounded TLS session memory
  accumulation so that the ingress layer operates without unplanned restarts.

  [Scenario]
  Over the past several days the ingress controller pod has been OOMKilled
  every 4–6 hours. Each crash interrupts all HTTPS traffic until the pod
  restarts automatically, but the underlying condition is never cleared and
  the cycle repeats.

  Inspection of the deployment reveals OOMKill history annotations and events
  pointing to memory exhaustion in the nginx process. No recent application
  changes were made that would explain the increased memory usage.

  Initial investigation points to the nginx process itself consuming memory
  beyond the pod limit. The nginx ConfigMap controlling TLS behaviour has not
  been audited since the controller was first deployed, and platform-wide
  tuning standards have since been updated.

  Platform operational configuration is stored in `ingress-system`. Investigate
  the available resources to identify which source reflects current platform
  standards — not all objects in the namespace contain current values.

  [Goals]

  Diagnose the root cause of the periodic OOMKill crashes and restore stable
  operation:

  1. Identify which nginx TLS configuration parameters are contributing to
     unbounded memory growth and apply the platform-approved corrected values.
     Use the current platform standard values as the authoritative source for
     the fix — do not guess or infer values independently.

  2. Ensure the running nginx process reflects the corrected configuration —
     the fix must be active in the live process, not only on disk.

  3. Confirm stable HTTPS operation with no new pod restarts after the fix
     is applied.

  [Constraints]

  Investigate the existing configuration rather than rebuilding the system.
  Do not modify container images or pod memory limits. The corrected
  configuration must persist across nginx reloads and pod restarts.

metadata:
  category: kubernetes
  difficulty: hard
  estimated_time: 1H
  tags:
    - kubernetes
    - ingress
    - nginx
    - tls
    - memory-leak
    - incident-response

allowed_namespaces:
  - ingress-system
