name: Ingress-Controller-TLS-Memory-Leak
author: apex
version: 1

description: >
  The ingress controller running in namespace ingress-system is experiencing
  periodic gateway crashes caused by a TLS configuration memory leak.

  The nginx configuration stored in the ConfigMap ingress-nginx-config
  disables keepalive connections which causes TLS session exhaustion.

  Your task is to fix the configuration so nginx uses a valid
  keepalive timeout.

category: kubernetes
difficulty: medium

tags:
  - kubernetes
  - nginx
  - ingress
  - debugging

estimated_duration: 15
max_agent_steps: 25
timeout: 600

prompt: |
  The ingress controller in namespace `ingress-system` is experiencing
  periodic gateway crashes.

  Investigation shows a TLS termination configuration memory leak.

  The issue is caused by the nginx configuration in the ConfigMap:

      ingress-nginx-config

  The configuration currently disables keepalive connections:

      keepalive_timeout 0;

  This causes excessive TLS session allocations.

  Fix the configuration so nginx uses:

      keepalive_timeout 65;

  Constraints:

  - Do NOT delete or recreate the Deployment
  - Deployment UID must remain unchanged
  - Container image must remain nginx:alpine
  - Memory limit must remain 128Mi
  - Deployment must remain healthy
  - nginx must continue serving HTTP successfully

instructions: |
  Inspect the ConfigMap `ingress-nginx-config` in namespace
  `ingress-system`.

  The nginx configuration currently contains an invalid
  keepalive timeout that causes a memory leak.

  Update the configuration so nginx uses:

      keepalive_timeout 65;

  Ensure the ingress controller reloads the configuration.

setup_script: setup.sh
solution_script: solution.sh
grader_script: grader.py