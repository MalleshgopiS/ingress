prompt: |
  [Context]
  You are an SRE on-call for a Kubernetes cluster running an nginx-based ingress controller.

  [Incident]
  Over the past few days, the ingress controller pod in the `ingress-system` namespace has been restarting periodically.

  Initial observations:
  - Restarts happen every few hours
  - No recent deployment changes were made
  - HTTPS traffic briefly drops during restarts

  [Available Signals]
  - Kubernetes events and pod status
  - nginx configuration inside the cluster
  - Existing cluster configuration objects (ConfigMaps, Secrets)

  Some configuration references exist in the cluster, but not all of them are reliable or up to date.

  [Objective]
  Identify the root cause of the instability and restore stable operation of the ingress controller.

  The system should:
  - Stop restarting unexpectedly
  - Continue serving HTTPS traffic correctly
  - Preserve existing configuration structure

  [Constraints]
  - Do not increase memory limits
  - Do not replace the deployment
  - Fix the issue through configuration investigation and correction