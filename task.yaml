id: ingress-tls-memory-leak
prompt: |
  [Context]
  You are an SRE on-call responsible for maintaining the ingress layer of a Kubernetes cluster.

  [Incident]
  The ingress controller in the `ingress-system` namespace has been experiencing periodic OOM-kill restarts over the past few days.

  Observations from the team:
  - Restarts occur every few hours under sustained HTTPS load
  - No recent deployments were made
  - HTTPS traffic is intermittently unavailable during restarts
  - Memory usage grows steadily and correlates with HTTPS connection volume
  - The nginx process is the memory consumer; engineers believe its TLS session handling is misconfigured

  Note: there are multiple configuration references in the cluster. Some contain values that are themselves too large for a memory-constrained environment — do not copy them blindly. The authoritative source is the live nginx configuration in `ingress-nginx-config`.

  [Objective]
  Inspect the nginx TLS session configuration and correct the parameters responsible for the memory growth.

  A correctly configured nginx TLS session setup requires all three of the following:
  - Session cache: shared memory zone (not per-worker builtin), no larger than 10 MB
  - Session timeout: no longer than 20 minutes (values in hours or days cause session accumulation)
  - Session buffer: per-connection buffer no larger than 16k

  All three directives are present in the active nginx configuration and need to be set within the bounds above.
  Apply your fix and ensure the live nginx process picks up the updated configuration.

  [Constraints]
  These are hard requirements and will be validated:
  - Do not increase memory limits on any container
  - Do not delete or replace the deployment (a rollout restart is acceptable)
  - Fix only the root cause — do not patch around it by modifying resource limits or replacing workloads

metadata:
  category: kubernetes
  difficulty: hard
  estimated_time: 1H
  tags:
    - kubernetes
    - ingress
    - nginx
    - incident-response
    - configuration

allowed_namespaces:
  - ingress-system
