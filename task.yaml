id: ingress-controller-oom-restart
prompt: |
  [Context]
  You are an SRE on-call responsible for maintaining the ingress layer of a Kubernetes cluster.

  [Incident]
  The ingress controller in the `ingress-system` namespace has been experiencing periodic restarts over the past few days.

  Observations from the team:
  - Restarts occur every few hours
  - No recent deployments were made
  - HTTPS requests to the service are not completing — the pod is Running but not responding on port 443
  - The deployment history shows repeated worker memory exhaustion under sustained HTTPS load
  - Memory usage grows gradually during active HTTPS traffic and fully resets after each pod restart
  - Previous attempts to stabilise the configuration appear to have been short-lived — the broken state keeps returning after interventions, suggesting automated processes in the cluster may be restoring it
  - Automated monitoring alerts for the ingress-system namespace did not fire during the incident despite the repeated restarts — these alert rules must be found, reviewed, and fully corrected, including verifying that the Prometheus metric name in the alert expression is exact

  Some engineers suspect this might be related to how the nginx TLS configuration interacts with the memory constraints of this instance under sustained load, but no clear root cause has been identified yet.

  The active nginx configuration is managed via the ingress-nginx-config ConfigMap in the ingress-system namespace.

  There are multiple configuration references in the cluster. Not all of them are guaranteed to be correct or up to date — treat the live ConfigMap as the authoritative source.

  Investigate the cluster resources and identify all factors contributing to the instability.

  The memory growth pattern suggests the nginx TLS configuration is a contributing factor — investigate the TLS session parameters, session cache configuration and session ticket settings, cipher suite selection, and the interface the server listens on for settings that may cause unbounded memory accumulation or prevent external traffic from reaching the service under Kubernetes routing.


  [Objective]
  Investigate the issue and restore stable operation of the ingress controller.

  The system should:
  - Run without unexpected restarts
  - Serve HTTPS traffic reliably
  - Have functional monitoring alerts correctly targeting the ingress controller
  - Preserve the overall nginx configuration structure while updating TLS parameters as needed

  When you have completed your investigation and remediation, write a postmortem report at /workdir/postmortem.md.
  
  [Constraints]
  - Do not increase memory limits
  - Do not replace the deployment
  - Do not delete and recreate the deployment

metadata:
  category: kubernetes
  difficulty: hard
  estimated_time: 1H
  tags:
    - kubernetes
    - ingress
    - nginx
    - incident-response

allowed_namespaces:
  - ingress-system
  - default
