id: ingress-tls-memory-leak
title: Ingress Controller TLS Termination Memory Leak Causing Periodic Gateway Crashes
difficulty: hard
category: kubernetes

description: |
  The platform edge gateway has become unreliable.

  Users are reporting intermittent HTTPS failures that appear
  to worsen over time. After gateway restarts traffic recovers
  briefly, then degrades again. The team has ruled out
  infrastructure failure and suspects the ingress configuration.

  Workloads are deployed in the ingress-system namespace.

  Investigate the running ingress controller and its configuration.
  The system is considered restored when HTTPS traffic flows reliably
  through the gateway and the controller remains stable under
  sustained load without requiring restarts.

constraints:
  - Do not modify container images
  - Do not change resource limits
  - Do not add or remove services
  - Apply configuration-level fixes only

allowed_namespaces:
  - ingress-system