id: ingress-gateway-static-ui-regression

title: Edge Gateway Static UI Regression With Broken TLS Routing

prompt: |
  [Context]
  You are a DevOps engineer working on Bleater, a distributed microservices-based social media platform.
  The affected resources for this incident are in the `aurora-ingress` namespace. You can check all available namespaces at `/home/ubuntu/.allowed_namespaces`.
  The environment is running on Kubernetes (k3s), and the public entrypoint for this incident is the `edge-gateway` service.

  [TASK]
  A recent gateway refactor split the dashboard shell, the static asset bundle, and the API health endpoint behind a shared TLS edge proxy.
  Since that change, users report that the dashboard is unavailable over HTTPS, static assets are missing, and the API health endpoint through the gateway is failing.
  The backend pods are present, but the edge proxy routing and its client connection handling are both misconfigured.

  Restore the edge gateway so all of the following work through the `edge-gateway` service over HTTPS:
  - `/` returns the Bleater dashboard HTML
  - `/assets/app.js` returns the dashboard JavaScript bundle
  - `/api/health` returns the API health payload

  Constraints:
  - Do not change container images
  - Do not change resource limits
  - Keep the existing gateway and backend topology
  - Solve the incident through Kubernetes configuration and rollout changes only
  - Do NOT use any interactive commands, for example `-i` or `-it`, in `docker exec`, or any other TTY commands

difficulty: hard
category: Platform Engineering

